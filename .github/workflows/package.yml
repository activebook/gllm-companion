name: Package VSCode Extension

on:
  # Disabled to avoid redundant builds: pushing to main then creating a release
  # would trigger the workflow twice. Only run on release creation now.
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    name: Build and Package Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build Extension
        run: npm run compile

      - name: Get Version from package.json
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Package Extension (VSIX)
        run: npx vsce package --out gllm-companion-${{ steps.get_version.outputs.VERSION }}.vsix

      - name: Verify VSIX File Exists
        run: ls -l *.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gllm-companion-extension
          path: '*.vsix'
          retention-days: 7

      - name: Upload to Release (If Triggered by Release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
